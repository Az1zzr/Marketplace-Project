vich_uploader:
    db_driver: orm
    metadata:
        type: attribute
    mappings:
        profile_photos:
            uri_prefix: /uploads/profile
            upload_destination: '%kernel.project_dir%/public/uploads/profile'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: false
            delete_on_remove: false
