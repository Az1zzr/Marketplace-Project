security:
  password_hashers:
    App\Entity\User: "auto"

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_user_provider
      user_checker: App\Security\UserChecker
      form_login:
        login_path: app_login
        check_path: app_login
        default_target_path: app_home
        username_parameter: email
        password_parameter: password
      logout:
        path: app_logout
        target: app_login

  access_control:
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
    - { path: ^/reset-password, roles: PUBLIC_ACCESS }
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/account/profile, roles: ROLE_USER }
    - { path: ^/user, roles: ROLE_ADMIN }
    - { path: ^/role, roles: ROLE_ADMIN }
    - { path: ^/produit/\d+/buy$, roles: ROLE_CLIENT }
    - { path: ^/categorie, roles: [ROLE_ADMIN, ROLE_FOURNISSEUR] }
    - { path: ^/commande/new$, roles: ROLE_CLIENT }
    - { path: ^/commande/ligne/\d+/delete$, roles: ROLE_CLIENT }
    - { path: ^/commande/\d+/(edit|delete)$, roles: ROLE_ADMIN }
    - { path: ^/commande, roles: [ROLE_ADMIN, ROLE_CLIENT, ROLE_FOURNISSEUR] }
    - { path: ^/livraison/new, roles: [ROLE_ADMIN, ROLE_FOURNISSEUR] }
    - {
        path: ^/livraison/\d+/(edit|delete)$,
        roles: [ROLE_ADMIN, ROLE_FOURNISSEUR],
      }
    - { path: ^/livraison, roles: [ROLE_ADMIN, ROLE_CLIENT, ROLE_FOURNISSEUR] }
    - { path: ^/feedback/new, roles: ROLE_CLIENT }
    - { path: ^/feedback/livraison/\d+/new$, roles: ROLE_CLIENT }
    - { path: ^/feedback/\d+/reponse/new$, roles: ROLE_USER }
    - { path: ^/reponse/\d+/delete$, roles: ROLE_USER }
    - { path: ^/, roles: ROLE_USER }

when@test:
  security:
    password_hashers:
      App\Entity\User:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
